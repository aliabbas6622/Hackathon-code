services:
  - type: web
    name: ligma-api
    runtime: node
    plan: free
    buildCommand: cd backend && corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ligma/api-server run build && touch api-server/.env
    startCommand: cd backend && pnpm --filter @ligma/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ligma-postgres
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_1
        sync: false
      - key: OPENROUTER_2
        sync: false
      - key: GROQ_1
        sync: false
      - key: GROQ_2
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: ligma-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ligma/ligma run build
    staticPublishPath: frontend/ligma/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ligma-api
          type: web
          property: host

databases:
  - name: ligma-postgres
    databaseName: ligma
    plan: free
